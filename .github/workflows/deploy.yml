name: Deploy to Cloudflare Pages

# Auto-deploys the static build to Cloudflare Pages on every push.
# Requires two repo secrets (Settings → Secrets and variables → Actions):
#   CLOUDFLARE_API_TOKEN   — a Custom Token with "Account · Cloudflare Pages · Edit"
#   CLOUDFLARE_ACCOUNT_ID  — from your Cloudflare dashboard sidebar
on:
  push:
    branches:
      - main
      - claude/uploading-icons-fFEcu
  workflow_dispatch: # lets you trigger a deploy manually from the Actions tab

permissions:
  contents: read

# Don't let two pushes deploy at the same time; newest wins.
concurrency:
  group: cloudflare-pages-deploy
  cancel-in-progress: true

# Project + subdomain name → https://<PROJECT_NAME>.pages.dev
env:
  PROJECT_NAME: my-cards

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build static site
        run: npm run generate

      - name: Ensure the Pages project exists (no-op after the first run)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          npx --yes wrangler@4 pages project create "$PROJECT_NAME" \
            --production-branch=main 2>/dev/null || true

      - name: Deploy to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        # --branch=main marks this a *production* deploy, so it always lands on
        # the stable https://<PROJECT_NAME>.pages.dev URL (not a preview alias).
        run: |
          npx --yes wrangler@4 pages deploy .output/public \
            --project-name="$PROJECT_NAME" \
            --branch=main
